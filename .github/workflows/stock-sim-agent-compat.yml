name: Stock Simulator RL Agent Compatibility

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "scripts/check_stock_sim_agent_compat.py"
      - "scripts/compose.sh"
      - "examples/docker-compose.stock-sim-dashboard-agent-experiments.yml"
      - "Makefile"
      - "README.md"
      - ".github/workflows/stock-sim-agent-compat.yml"
  schedule:
    - cron: "32 13 3 * *"  # monthly scattered (was: 20 9 * * 1)
  workflow_dispatch:


concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  stock-sim-agent-compat:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout integration hub
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"

      - name: Clone stock simulator/dashboard/agent repos
        run: |
          set -euo pipefail
          git clone --depth=1 https://github.com/FelipeFuhr/ffreis-stock-simulator.git ../ffreis-stock-simulator
          git clone --depth=1 https://github.com/FelipeFuhr/ffreis-stock-simulator-dashboard-go.git ../ffreis-stock-simulator-dashboard-go
          git clone --depth=1 https://github.com/FelipeFuhr/ffreis-stock-rl-agent.git ../ffreis-stock-rl-agent

      - name: Run simulator-agent compatibility smoke
        run: |
          set -euo pipefail
          make smoke-stock-sim-agent-compat

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: stock-sim-agent-compat-artifacts-${{ github.run_id }}
          if-no-files-found: warn
          path: artifacts/
