name: Weekly Cross-Repo Contracts

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

jobs:
  weekly-contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - name: Checkout integration hub
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"

      - name: Setup uv
        uses: astral-sh/setup-uv@v3

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run weekly parity
        env:
          INTEGRATION_REPO_TOKEN: ${{ secrets.INTEGRATION_REPO_TOKEN }}
        run: |
          make weekly-check

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-contracts-artifacts
          path: artifacts/
